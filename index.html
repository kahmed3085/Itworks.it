<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ItWorks - AI‑First Managed Services</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      line-height: 1.6;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 0 20px;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .hero p {
      font-size: 1.25rem;
      max-width: 600px;
      margin-bottom: 2rem;
      color: #555555;
    }
    .cta-button {
      background: #000000;
      color: #ffffff;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.3s ease;
    }
    .cta-button:hover {
      background: #333333;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      color: #777777;
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>AI‑First Managed Services. Future‑Ready IT.</h1>
    <p>
      We combine intelligent automation with expert oversight to deliver faster, smarter, and more reliable IT support for modern businesses.
    </p>
    <a href="#contact" class="cta-button">Get Started</a>
  </section>

  <footer>
    © 2026 ItWorks. Powered by AI.
  </footer>
</body>
</html>
